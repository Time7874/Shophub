<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopHub - Cart</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f8f9fa; }

    header { background: #333; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 1.5rem; }
    nav a {
      color: white;
      margin-left: 1rem;
      text-decoration: none;
      position: relative;
    }
    nav a::after {
      content: "";
      position: absolute;
      width: 0;
      height: 2px;
      bottom: 0;
      left: 0;
      background-color: #0f0;
      transition: width 0.3s;
    }
    nav a:hover::after {
      width: 100%;
    }

    .container {
      max-width: 1000px;
      margin: 2rem auto;
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 { margin-bottom: 1rem; color: #333; }

    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 1rem;
      border-bottom: 1px solid #ccc;
      text-align: left;
    }
    td img {
      width: 80px;
      height: 60px;
      object-fit: cover;
    }
    .quantity {
      display: flex;
      align-items: center;
    }
    .quantity input {
      width: 50px;
      text-align: center;
      margin: 0 10px;
    }
    .remove-btn {
      background: #dc3545;
      color: white;
      border: none;
      padding: 5px 10px;
      cursor: pointer;
      border-radius: 4px;
    }
    .remove-btn:hover {
      background: #c82333;
    }

    .total-section {
      text-align: right;
      margin-top: 1rem;
    }
    .checkout-btn {
      background: #28a745;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      cursor: pointer;
    }
    .checkout-btn:hover {
      background: #218838;
    }

    footer {
      background: #222;
      color: #ccc;
      padding: 2rem 0;
      text-align: center;
      margin-top: 2rem;
    }
    .footer-cols {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
    }
    .footer-col {
      margin: 1rem;
    }
    .footer-col h4 {
      margin-bottom: 1rem;
      color: #fff;
    }
    .footer-col a {
      display: block;
      color: #aaa;
      text-decoration: none;
      margin-bottom: 0.5rem;
    }
    .footer-col a:hover {
      color: #fff;
    }
  </style>
</head>
<body>

<header>
  <h1>ShopHub</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="cart.html">Cart</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<div class="container">
  <h2>Your Shopping Cart</h2>
  <table id="cartTable">
    <thead>
      <tr>
        <th>Product</th>
        <th>Name</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Subtotal</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <!-- Cart items will be dynamically inserted -->
    </tbody>
  </table>
  <div class="total-section">
    <h3>Total: $<span id="cartTotal">0.00</span></h3>
    <button class="checkout-btn">Proceed to Checkout</button>
  </div>
</div>

<footer>
  <div class="footer-cols">
    <div class="footer-col">
      <h4>ShopHub</h4>
      <a href="#">About Us</a>
      <a href="#">Careers</a>
      <a href="#">Blog</a>
    </div>
    <div class="footer-col">
      <h4>Customer Service</h4>
      <a href="#">Help Center</a>
      <a href="#">Returns</a>
      <a href="#">Shipping</a>
    </div>
    <div class="footer-col">
      <h4>Follow Us</h4>
      <a href="#">Facebook</a>
      <a href="#">Instagram</a>
      <a href="#">Twitter</a>
    </div>
  </div>
  <p>&copy; 2025 ShopHub. All rights reserved.</p>
</footer>

<script>
  const cartItems = JSON.parse(localStorage.getItem("cart")) || [];
  const cartTableBody = document.querySelector("#cartTable tbody");
  const cartTotal = document.getElementById("cartTotal");

  function updateTotal() {
    let total = 0;
    document.querySelectorAll(".subtotal").forEach(sub => {
      total += parseFloat(sub.textContent);
    });
    cartTotal.textContent = total.toFixed(2);
  }

  function updateQuantity(index, value) {
    cartItems[index].quantity = parseInt(value);
    localStorage.setItem("cart", JSON.stringify(cartItems));
    renderCart();
  }

  function removeItem(index) {
    cartItems.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cartItems));
    renderCart();
  }

  function renderCart() {
    cartTableBody.innerHTML = "";
    cartItems.forEach((item, index) => {
      const subtotal = (item.price * item.quantity).toFixed(2);
      const row = `
        <tr>
          <td><img src="${item.image}" alt="${item.name}"></td>
          <td>${item.name}</td>
          <td>$${item.price.toFixed(2)}</td>
          <td>
            <div class="quantity">
              <input type="number" value="${item.quantity}" min="1" onchange="updateQuantity(${index}, this.value)">
            </div>
          </td>
          <td class="subtotal">${subtotal}</td>
          <td><button class="remove-btn" onclick="removeItem(${index})">Remove</button></td>
        </tr>`;
      cartTableBody.innerHTML += row;
    });
    updateTotal();
  }

  renderCart();
</script>

</body>
</html>
